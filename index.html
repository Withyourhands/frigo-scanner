<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: black; height: 100vh; overflow: hidden; font-family: -apple-system, sans-serif; }
    #video { width: 100%; height: 100vh; object-fit: cover; }
    .overlay {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      pointer-events: none;
    }
    .frame {
      width: 75vw;
      height: 35vw;
      position: relative;
    }
    .frame::before, .frame::after,
    .corner-br, .corner-bl {
      content: '';
      position: absolute;
      width: 10vw; height: 10vw;
      border-color: #22c55e;
      border-style: solid;
    }
    .frame::before { top:0; left:0; border-width: 4px 0 0 4px; }
    .frame::after  { top:0; right:0; border-width: 4px 4px 0 0; }
    .corner-br { bottom:0; right:0; border-width: 0 4px 4px 0; }
    .corner-bl { bottom:0; left:0; border-width: 0 0 4px 4px; }
    .line {
      position: absolute;
      left: 2px; right: 2px; height: 3px;
      background: linear-gradient(90deg, transparent, #22c55e, transparent);
      animation: scan 2s linear infinite;
    }
    @keyframes scan {
      0%   { top: 4px; }
      100% { top: calc(100% - 7px); }
    }
    .hint {
      margin-top: 6vw;
      color: white;
      font-size: 4.5vw;
      font-weight: 700;
      background: rgba(0,0,0,0.6);
      padding: 3vw 6vw;
      border-radius: 30px;
      text-align: center;
    }
    .btn-close {
      position: fixed;
      top: 5vw; right: 5vw;
      background: rgba(255,255,255,0.2);
      border: none;
      border-radius: 50%;
      width: 12vw; height: 12vw;
      font-size: 6vw;
      color: white;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
    }
    .success {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: #15803d;
      color: white;
      padding: 6vw;
      font-size: 5vw;
      font-weight: 800;
      text-align: center;
      transform: translateY(100%);
      transition: transform 0.3s;
    }
    .success.show { transform: translateY(0); }
  </style>
</head>
<body>

<video id="video" playsinline autoplay muted></video>

<div class="overlay">
  <div class="frame">
    <div class="line"></div>
    <div class="corner-br"></div>
    <div class="corner-bl"></div>
  </div>
  <div class="hint">Centrez le code-barres dans le cadre</div>
</div>

<button class="btn-close" onclick="fermer()">✕</button>
<div class="success" id="success">✅ Code détecté !</div>

<script src="https://unpkg.com/@zxing/library@0.18.6/umd/index.min.js"></script>
<script>
let stream = null;
let codeReader = null;
let detected = false;

const APP_URL = 'https://script.google.com/macros/s/AKfycbxIOp2zVIH_FgXdXbnb24Coea2peU89G9FHkS6Wslik-C6RMlyDzKQAqWFoo_oYB10Z/exec';

async function init() {
  try {
    stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: { ideal: 'environment' }, width: { ideal: 1280 }, height: { ideal: 720 } }
    });
    const video = document.getElementById('video');
    video.srcObject = stream;
    await video.play();

    codeReader = new ZXing.BrowserMultiFormatReader();
    codeReader.decodeFromStream(stream, video, (result, err) => {
      if (result && !detected) {
        detected = true;
        const code = result.getText();
        document.getElementById('success').textContent = '✅ ' + code;
        document.getElementById('success').classList.add('show');
        if (navigator.vibrate) navigator.vibrate(200);
        stopCamera();
        setTimeout(() => {
          window.location.href = APP_URL + '?code=' + encodeURIComponent(code);
        }, 800);
      }
    });
  } catch(err) {
    document.querySelector('.hint').textContent = err.name === 'NotAllowedError'
      ? '⚠️ Autorisez la caméra dans Safari'
      : '❌ Caméra non disponible';
  }
}

function stopCamera() {
  if (codeReader) { try { codeReader.reset(); } catch(e) {} }
  if (stream) { stream.getTracks().forEach(t => t.stop()); }
}

function fermer() {
  stopCamera();
  window.location.href = APP_URL;
}

init();
</script>
</body>
</html>
